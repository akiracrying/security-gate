<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <style>
      .box { fill: #e8f4f8; stroke: #2d7ab0; stroke-width: 1.5; }
      .gate { fill: #fff3cd; stroke: #856404; }
      .block { fill: #f8d7da; stroke: #721c24; }
      .ok { fill: #d4edda; stroke: #155724; }
      text { font-family: sans-serif; font-size: 12px; }
      .title { font-weight: bold; font-size: 14px; }
    </style>
  </defs>
  <text x="360" y="20" text-anchor="middle" class="title">Security gates pipeline</text>
  <!-- PR stage -->
  <rect x="20" y="50" width="80" height="36" class="box" rx="4"/>
  <text x="60" y="72" text-anchor="middle">Checkout</text>
  <rect x="110" y="50" width="80" height="36" class="gate" rx="4"/>
  <text x="150" y="72" text-anchor="middle">Gitleaks</text>
  <rect x="200" y="50" width="80" height="36" class="gate" rx="4"/>
  <text x="240" y="72" text-anchor="middle">Semgrep</text>
  <rect x="290" y="50" width="80" height="36" class="gate" rx="4"/>
  <text x="330" y="72" text-anchor="middle">Trivy SCA</text>
  <rect x="380" y="50" width="100" height="36" class="gate" rx="4"/>
  <text x="430" y="72" text-anchor="middle">Dep review</text>
  <rect x="490" y="50" width="90" height="36" class="gate" rx="4"/>
  <text x="535" y="72" text-anchor="middle">Gate decider</text>
  <text x="320" y="42" text-anchor="middle" font-size="11">PR stage (pull_request)</text>
  <!-- Arrows PR -->
  <path d="M100 68 L110 68" stroke="#333" fill="none" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M190 68 L200 68" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M280 68 L290 68" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M370 68 L380 68" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M480 68 L490 68" stroke="#333" fill="none" stroke-width="1"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333"/></marker></defs>
  <!-- Release stage -->
  <rect x="20" y="140" width="80" height="36" class="box" rx="4"/>
  <text x="60" y="162" text-anchor="middle">Checkout</text>
  <rect x="110" y="140" width="80" height="36" class="gate" rx="4"/>
  <text x="150" y="162" text-anchor="middle">Gitleaks</text>
  <rect x="200" y="140" width="80" height="36" class="gate" rx="4"/>
  <text x="240" y="162" text-anchor="middle">CodeQL</text>
  <rect x="290" y="140" width="80" height="36" class="gate" rx="4"/>
  <text x="330" y="162" text-anchor="middle">Trivy FS</text>
  <rect x="380" y="140" width="90" height="36" class="gate" rx="4"/>
  <text x="425" y="162" text-anchor="middle">Container</text>
  <rect x="480" y="140" width="90" height="36" class="gate" rx="4"/>
  <text x="525" y="162" text-anchor="middle">Gate decider</text>
  <text x="320" y="132" text-anchor="middle" font-size="11">Release stage (push main / workflow_dispatch)</text>
  <path d="M100 158 L110 158" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M190 158 L200 158" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M280 158 L290 158" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M370 158 L380 158" stroke="#333" fill="none" stroke-width="1"/>
  <path d="M470 158 L480 158" stroke="#333" fill="none" stroke-width="1"/>
  <!-- Outcomes -->
  <rect x="600" y="50" width="100" height="32" class="ok" rx="4"/>
  <text x="650" y="70" text-anchor="middle">Allow/Warn</text>
  <rect x="600" y="140" width="100" height="32" class="block" rx="4"/>
  <text x="650" y="160" text-anchor="middle">Block</text>
  <path d="M580 68 L600 66" stroke="#155724" fill="none" stroke-width="1" stroke-dasharray="4,2"/>
  <path d="M580 158 L600 156" stroke="#721c24" fill="none" stroke-width="1" stroke-dasharray="4,2"/>
</svg>
