# Time-boxed risk acceptance exceptions
# id, tool, match (CVE or rule id), scope, reason, owner, expires (ISO date)
# If a finding matches and expires is in the future: block -> warn

- id: example-sca-no-fix
  tool: trivy
  match: "CVE-XXXX-XXXXX"
  scope: "demo/juice-shop-master/package.json"
  reason: "No fix available; tracked for upgrade"
  owner: "security-team"
  expires: "2026-06-01"

