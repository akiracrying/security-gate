# Minimal Gitleaks config — reduce noise, keep high-confidence secret detection
title = "security-gate gitleaks"
version = "1.0"
minVersion = "v8.0.0"

[allowlist]
description = "Exclude demo/synthetic and common false positives"
paths = [
  '''juice-shop-master/demo/FAKE_SECRET\.txt''',
  '''.*\.md$''',
  '''package-lock\.json$''',
  '''.*\.min\.js$''',
  '''.*\.snap$''',
  '''node_modules/'''
]
regexes = [
  '''(?i)dummy|example|sample|placeholder|xxx|test|fake'''
]

# Only high-signal rules; use default gitleaks for full set or omit custom config
[[rules]]
id = "generic-secret"
description = "High-entropy generic secret"
regex = '''(?i)(?:api[_-]?key|apikey|secret|password|passwd|token)\s*[:=]\s*['"]?([a-zA-Z0-9_\-+=/]{20,})['"]?'''
entropy = 3.5
keywords = ["api", "secret", "password", "token"]
