# Gitleaks config: default rules + custom allowlist + extra rules
title = "security-gate gitleaks"

[extend]
# Load all default gitleaks rules (AWS, GCP, GitHub tokens, generic-api-key, etc.)
useDefault = true

[allowlist]
description = "Exclude demo/synthetic and common false positives"
paths = [
  '''demo/juice-shop-master/demo/FAKE_SECRET\.txt''',
  '''.*\.md$''',
  '''package-lock\.json$''',
  '''.*\.min\.js$''',
  '''.*\.snap$''',
  '''node_modules/''',
  '''\.git/'''
]
regexes = [
  '''(?i)dummy|example|sample|placeholder|xxx|test|fake'''
]

# Extra custom rule on top of defaults
[[rules]]
id = "custom-generic-secret"
description = "High-entropy generic secret (custom)"
regex = '''(?i)(?:api[_-]?key|apikey|secret|password|passwd|token)\s*[:=]\s*['"]?([a-zA-Z0-9_\-+=/]{20,})['"]?'''
entropy = 3.5
keywords = ["api", "secret", "password", "token"]
