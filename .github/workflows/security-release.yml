# Security gates — Release/main stage: strict blocking
name: Security (Release)
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create reports dir
        run: mkdir -p reports

      # --- Secrets: block on any (gitleaks latest) ---
      - name: Gitleaks
        run: |
          set +e
          GITLEAKS_VER=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER#v}_linux_x64.tar.gz" | tar -xz -C /tmp
          /tmp/gitleaks detect --source . --no-git --config security/gitleaks.toml --report-format json --report-path /tmp/gitleaks.json
          GL_EXIT=$?
          echo "::notice::Gitleaks exit code: $GL_EXIT"
          if [ -f /tmp/gitleaks.json ]; then
            echo "::notice::Gitleaks report size: $(wc -c < /tmp/gitleaks.json) bytes"
          else
            echo "::warning::Gitleaks report NOT created — writing empty array"
            echo '[]' > /tmp/gitleaks.json
          fi
          exit 0

      # --- SAST: CodeQL (block high/critical) ---
      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended

      - name: Run CodeQL
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: "/security-release"
          upload: true
          output: reports

      - name: Restore Gitleaks report
        run: cp /tmp/gitleaks.json reports/gitleaks.json

      # --- SAST: Semgrep (warn) ---
      - name: Semgrep
        continue-on-error: true
        run: |
          python3 -m pip install --upgrade semgrep -q 2>/dev/null || pip install --upgrade semgrep -q 2>/dev/null || pipx install semgrep 2>/dev/null || true
          semgrep scan --config auto --config security/semgrep.yml --sarif --output reports/semgrep.sarif . 2>/dev/null || true
          [ ! -f reports/semgrep.sarif ] && echo '{"runs":[]}' > reports/semgrep.sarif
        working-directory: ${{ github.workspace }}

      # --- SCA: Trivy FS (block CRITICAL/HIGH with fix on release) ---
      - name: Trivy FS
        run: |
          set +e
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp
          /tmp/trivy fs --severity CRITICAL,HIGH --format json --output reports/trivy.json . 2>/dev/null || true
          if [ -d demo/juice-shop-master ]; then
            /tmp/trivy fs --severity CRITICAL,HIGH,MEDIUM --format json --output reports/trivy-juiceshop.json demo/juice-shop-master 2>/dev/null || true
          fi
          [ ! -f reports/trivy.json ] && echo '{"Results":[]}' > reports/trivy.json
          exit 0
        working-directory: ${{ github.workspace }}

      - name: Generate lock files for SCA
        run: |
          if [ -f demo/juice-shop-master/package.json ]; then
            cd demo/juice-shop-master
            npm install --package-lock-only --ignore-scripts 2>/dev/null || true
            if [ -d frontend ] && [ -f frontend/package.json ]; then
              cd frontend && npm install --package-lock-only --ignore-scripts 2>/dev/null || true
              cd ..
            fi
            cd ../..
          fi
        continue-on-error: true

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: 'security-gate'
          path: 'demo/juice-shop-master'
          format: 'JSON'
          out: 'reports'
          args: >
            --failOnCVSS 0
            --exclude "**/test/files/**"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-release-json
          path: reports/

      # --- Container scan (if Dockerfile present) ---
      - name: Build image for scan
        id: build
        run: |
          if [ -f demo/juice-shop-master/Dockerfile ] || [ -f Dockerfile ]; then
            docker build -t juice-shop-scan:local -f demo/juice-shop-master/Dockerfile demo/juice-shop-master 2>/dev/null || docker build -t juice-shop-scan:local . 2>/dev/null || true
            echo "built=1" >> $GITHUB_OUTPUT
          else
            echo "built=0" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Trivy image scan
        if: steps.build.outputs.built == '1'
        run: |
          set +e
          /tmp/trivy image --severity CRITICAL,HIGH --format json --output reports/trivy-image.json juice-shop-scan:local 2>/dev/null || true
          [ ! -f reports/trivy-image.json ] && echo '{"Results":[]}' > reports/trivy-image.json
          exit 0
        continue-on-error: true

      # --- Gate decider: uses policy for release; exit 1 = block ---
      - name: Gate decider
        id: gate
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          pip install pyyaml -q
          echo "=== Reports ==="
          ls -la reports/ || true
          echo "=== Gitleaks first 5 lines ==="
          head -c 500 reports/gitleaks.json || true
          echo ""
          echo "=== Depcheck files ==="
          ls -la reports/*dependency* reports/*security* 2>/dev/null || echo "no depcheck report found"
          echo "==========================="
          SARIF_ARGS=""
          for f in reports/*.sarif; do [ -f "$f" ] && SARIF_ARGS="$SARIF_ARGS --sarif $f"; done
          TRIVY_ARGS="--trivy reports/trivy.json"
          [ -f reports/trivy-image.json ] && TRIVY_ARGS="$TRIVY_ARGS --trivy reports/trivy-image.json"
          [ -f reports/trivy-juiceshop.json ] && TRIVY_ARGS="$TRIVY_ARGS --trivy reports/trivy-juiceshop.json"
          DEPCHECK_ARG=""
          for dc in reports/dependency-check-report.json reports/security-gate.json; do [ -f "$dc" ] && DEPCHECK_ARG="--depcheck $dc" && break; done
          python scripts/gate_decider.py \
            --gitleaks reports/gitleaks.json \
            $SARIF_ARGS \
            $TRIVY_ARGS \
            $DEPCHECK_ARG \
            --stage release \
            --policy security/policy.yml \
            --exceptions security/exceptions.yml \
            --export-latex docs/policy_mapping_table.tex
        working-directory: ${{ github.workspace }}
